<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/admin.css">
</head>

<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="bi bi-shield-lock"></i>
            <span>Admin Panel</span>
        </div>

        <nav>
            <a href="/admin/dashboard" class="nav-link active">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="/admin/team_members" class="nav-link">
                <i class="bi bi-people"></i> Team Members
            </a>
            <a href="/admin/donations" class="nav-link">
                <i class="bi bi-cash"></i> Donations
            </a>
            <a href="/admin/contacts" class="nav-link">
                <i class="bi bi-envelope"></i> Contacts
            </a>
            <a href="/admin/volunteers" class="nav-link">
                <i class="bi bi-people"></i> Volunteers
            </a>
            <a href="/admin/events" class="nav-link">
                <i class="bi bi-calendar"></i> Events
            </a>
            <a href="/admin/documents" class="nav-link">
                <i class="bi bi-file-earmark"></i> Documents
            </a>
            <a href="/admin/audit" class="nav-link">
                <i class="bi bi-clock-history"></i> Audit Logs
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOPBAR -->
        <header class="topbar d-flex justify-content-between align-items-center py-3 px-4">
            <div>
                <h4 class="mb-0">Admin Dashboard</h4>
            </div>

            <div class="top-actions d-flex align-items-center gap-3">
                <input type="text" class="form-control form-control-sm" placeholder="Search...">
                <i class="bi bi-bell"></i>

                <!-- PROFILE DROPDOWN -->
                <div class="dropdown">
                    <button class="btn profile-btn dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        Admin
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="bi bi-person"></i> Profile
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="#">
                                <i class="bi bi-gear"></i> Settings
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger" href="/admin/logout">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </main>

</div>

<!-- JS -->
<script src="/static/admin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
